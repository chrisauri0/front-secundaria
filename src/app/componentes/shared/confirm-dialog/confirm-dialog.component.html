@if (dialog.state$ | async; as state) {
  @if (state.open) {
  <div class="confirm-backdrop" (click)="cancel()">
    <div class="confirm-card" (click)="$event.stopPropagation()">
      <h3>{{ state.title }}</h3>
      <p>{{ state.message }}</p>
      <div class="confirm-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">{{ state.cancelText }}</button>
        <button type="button" class="btn-confirm" [class.danger]="state.tone === 'danger'" (click)="confirm()">
          {{ state.confirmText }}
        </button>
      </div>
    </div>
  </div>
  }
}
